# Crashes
crash.error.title=OMD\!
crash.error=O Crash Manager falhou. Isso é estranho, não é?\n\nVocê pode nos ajudar a resolver esse problema enviando os logs. Para salvar os logs, faça o seguinte: abra as configurações do launcher, abra a aba "Legacy Launcher" e selecione "Logger" -> "Sempre ativado", depois "Salvar".\nAgora você deve conseguir ver os logs.\n\nSalve-os em um arquivo (ou no Pastebin) e nos envie o que você conseguiu.
