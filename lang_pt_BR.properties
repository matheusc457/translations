crash.unknown.title=Alguma coisa deu errado...
crash.unknown.body=Minecraft fechou por um erro desconhecido (ainda, desconhecido c\:)\n\nEstá tudo bem. Acontece-nos a todos.\n\nVocê pode procurar a causa do problema por si próprio e pedir ajuda à nossa equipe de suporte \:)
crash.metaspace.title=Erro do Metaspace
crash.metaspace.body=Isso é apenas um erro de Metaspace. Desative sobreposições (como Discord e GeForce Experience) e tente novamente.\nEsse problema também pode ser causado por memória do sistema insuficiente. Feche aplicativos desnecessários e tente novamente
crash.oom-x86.title=Fora da memória
crash.oom-x86.body=Minecraft usou mais de toda a memória alocada para ele.\n\nDetectamos que você está executando o Java x86 em um sistema de 64 bits.\nUse o Java para sistemas de 64 bits em vez do atual.
crash.oom.title=Memória insuficiente
crash.oom.body=Minecraft usou a memória do sistema.\n\nTente desativar os argumentos otimizados ou ajuste a quantidade de memória.
crash.heap-x86.title=Erro de heap
crash.heap-x86.body=Seu sistema de 64 bits usa um Java de 32 bits, o que faz com que não seja possível alocar mais que 1.5 Gbyte de memória para o Minecraft.\n\nVocê deve instalar o Java de 64 bits ou reduzir o tamanho da memória alocada.
crash.heap-x86.buttons.open-settings=Abrir configurações
crash.heap.title=Heap excessivo
crash.heap.body=Não foi possível usar memória para o Minecraft devido ao imenso tamanho do heap.\n\nDiminua a memória usada.
crash.invalid-username.title=Diretório incorreto
crash.invalid-username.body=Não inicie o Java em diretórios com um «!».\n\nAbra as configurações e mude o diretório do Minecraft.
crash.firewall-block.title=Conexão bloqueada
crash.firewall-block.body=Não foi possível iniciar o Minecraft devido a um bloqueio de conexão. Pode ser culpa do seu antivírus ou da firewall.\n\nDesative o seu antivírus e sua firewall e tente de novo.\n\nSe está usando avast\! e desativá-lo não ajuda, reinstale-o.
crash.server-resource-pack.title=Erro ao carregar pacote de texturas
crash.server-resource-pack.body=Não foi possível usar o pacote de texturas do servidor devido a um erro desconhecido.\n\nTente se conectar pelo menu Multiplayer no Minecraft.
crash.incorrent-mods-version.title=Mod incompatível encontrado
crash.incorrent-mods-version.body=Há um mod na pasta de mods que não é compatível com a versão atual do Minecraft.\n\nRemova esse mod ou use a versão apropriada do Minecraft – então o jogo iniciará normalmente.
crash.codechicken-core-missing.title=É necessário CodeChickenCore
crash.codechicken-core-missing.body=É necessário CodeChickenCore para jogar um mod.\nBaixe o CodeChickenCore e o ponha na pasta "mods".
crash.codechicken-core-missing.buttons.download=Baixe CodeChickenCore
crash.graphics.general.title=Drivers Incompatíveis
crash.graphics.general.body=Minecraft foi fechado devido a drivers gráficos incompatíveis.\n\nNão conseguimos detectar sua placa gráfica. Entre em contato com o administrador do seu computador.
crash.graphics.intel.downgrade-to-jre8u60.title=Versão de Java incompatível
crash.graphics.intel.downgrade-to-jre8u60.body=O 1º e 2º chipset Intel drivers são incompatíveis com o Java superior a 8u60.\n\nInstale o Java 8u60, desinstalando o seu Java atual.
crash.graphics.intel.buttons.downgrade-to-jre8u60=Instalar Java 8 Update 60
crash.graphics.intel.1.10.title=Erro dos drivers da Intel
crash.graphics.intel.1.10.body=Esse erro é causado pelo erro dos drivers da Intel. Você pode fazer o seguinte para consertar o problema\:\n\n1) Atualizar seus drivers da Intel (importante\!)\n2) Aumentar a alocação de memória nas configurações do launcher\n3) Ligar o VSync e desligar VBOs usando configurações de gráficos em jogo
crash.graphics.update-driver.title=Os drivers %0 devem ser atualizados
crash.graphics.update-driver.body=Achamos que seu sistema está usando drivers gráficos desatualizados para %0.\n\nAtualize-os e tente de novo.
crash.graphics.buttons.driver-update=Atualizar drivers %0
crash.graphics.buttons.intel-nvidia-select=Como usar a placa de gráficos NVIDIA?
crash.graphics.buttons.intel-amd-select=Como configurar uma GPU AMD?
crash.arch.title=Erro de incompatibilidade
crash.arch.body=Esse erro é causado por incompatibilidade de arquitetura: seu sistema é 64-bit, mas o Java é 32-bit.\nInstale o Java 64-bit para resolver o problema.
crash.extracted-mods-found.title=Mods descompactados encontrados
crash.extracted-mods-found.body=O forge encontrou mods descompactados na pasta de mods. Por favor remova-os e tente de novo.
crash.analyzer.errored-mod.title=Erro em mod %0
crash.analyzer.errored-mod.body.single=Nós achamos que este <b>«%0»</b> (%1) está causando erros no Minecraft.\nVocê pode descobrir a causa você mesmo usando os logs ou procurando ajuda.\n\nSe você não precisa deste mod, você pode simplesmente excluí-lo.
crash.analyzer.errored-mod.body.multiple=Múltiplos mods fizeram o Minecraft ter erros:\n%0\n
crash.analyzer.buttons.errored-mod-delete.single=Excluir mod
crash.analyzer.buttons.errored-mod-delete.multiple=Excluir mods
crash.analyzer.buttons.errored-mod-delete.error.title=Não excluído
crash.analyzer.buttons.errored-mod-delete.error.no-mods-folder=Não foi possível achar a pasta dos mods. Isso é esquisito. Você pode abrir a pasta dos mods e excluir esse mod você mesmo.
crash.analyzer.buttons.errored-mod-delete.error.could-not-delete=Não foi possível excluir o arquivo. Por favor exclua-o você mesmo:
crash.analyzer.buttons.errored-mod-delete.success.title=Excluído com sucesso
crash.analyzer.buttons.errored-mod-delete.success.single=O arquivo foi excluído com sucesso. Você pode tentar iniciar o Minecraft de novo.
crash.analyzer.buttons.errored-mod-delete.success.multiple=Os arquivos foram excluídos. Você pode tentar iniciar o Minecraft de novo.
crash.shadersmod-detected.title=Shadersmod detectado
crash.shadersmod-detected.body=O OptiFine detectou o Shadersmod, que agora já faz parte do próprio OptiFine. Remova o Shadersmod.
crash.unsupported-java-version.title=Versão do Java incompatível
crash.unsupported-java-version.body=A versão do Java instalada é antiga demais para esta versão do Minecraft.\nAtualize o Java para a versão mais recente.
crash.update-optifine.title=OptiFine desatualizado
crash.update-optifine.body=Você está usando uma versão antiga do OptiFine.\nAtualize ou remova-o.
crash.update-optifine.buttons.update=Atualizar OptiFine
crash.fastcraft-optifine.title=Incompatibilidade entre FastCraft e OptiFine
crash.fastcraft-optifine.body=As versões atuais desses mods têm problemas de compatibilidade. Remova um deles ou atualize-os (caso existam versões mais novas e compatíveis).
crash.mods-duplicate.title=Mods duplicados?
crash.mods-duplicate.body=Você pode ter duas cópias do mesmo mod na pasta "mods".\nVerifique sua pasta de mods.
crash.jre9-and-above-not-supported.title=Java 9 ou superior não é suportado
crash.jre9-and-above-not-supported.body=O Forge, o OptiFine e muitos outros mods atualmente não são compatíveis com o Java 9 ou versões mais recentes.\nVocê pode usar o Java 8 ou verificar se seus mods foram atualizados para funcionar em versões mais novas.\nTambém é possível alternar a JVM para "recomendada" nas preferências do launcher.
crash.memory-leak.title=Vazamento de memória?
crash.memory-leak.body=Detectamos que a heap foi corrompida.\nSe esse problema ocorrer mais de uma vez, tente o seguinte:\n1) Desative os VBOs nas configurações de gráficos do Minecraft\n2) Aumente a memória alocada nas configurações do launcher\n3) Reinstale o Java\n4) De acordo com o rastreador de bugs oficial do Minecraft, tente remover o D3DGear (se estiver instalado)
crash.memory-leak.buttons.disable-vbos=Desativar VBOs
crash.bad-mainclass.title=Não foi possível encontrar a classe principal
crash.bad-mainclass.body=O Minecraft não pôde iniciar porque a JVM não encontrou a classe principal. O arquivo JAR (que contém todos os dados do jogo) pode estar corrompido.\nVocê pode tentar iniciar esta versão mais uma vez com a opção "Forçar atualização" marcada.
crash.bad-mainclass.check-javaargs.title=Verifique os argumentos
crash.bad-mainclass.check-javaargs.body=O Minecraft não pôde iniciar porque a JVM não encontrou a classe principal.\nVocê alterou suas configurações recentemente? Verifique o campo "Argumentos JVM" no menu de configurações.
crash.bad-mainclass.buttons.clear-javaargs=Limpar o campo "Argumentos JVM"
crash.java16.title=É necessária uma versão mais nova do Java
crash.java16.body=Ocorreu um erro ao selecionar a versão necessária do Java. Tente iniciar esta versão novamente. Se falhar de novo, não hesite em clicar em "Precisa de ajuda?" para que possamos te ajudar a resolver o problema.
crash.java16.old-java.title=É necessário o Java %0
crash.java16.old-java.body=O Minecraft exige o Java %0 para rodar. Não podemos usar a versão atual do Java.
crash.java16.old-java.version.unknown=de versão desconhecida
crash.java16.old-java.version.guessed=(provavelmente)
crash.java16.change-to-recommended.title=É necessário o Java %0
crash.java16.change-to-recommended.body=O Minecraft exige o Java %0 para rodar. Você pode tentar mudar o Java para "Recomendado" nas configurações.
crash.java16.force-update-version.title=Forçar atualização
crash.java16.force-update-version.body=Parece que um launcher mais antigo corrompeu os dados desta versão do Minecraft, e a informação sobre a atualização do Java 16 foi perdida. Clique em "Forçar atualização" para restaurar os dados e tentar novamente.
crash.java16.buttons.retry-with-recommended=Tentar com o Java "Recomendado"
